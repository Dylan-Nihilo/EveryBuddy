<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EveryBuddy · 终端宠物</title>
    <meta name="theme-color" content="#11161d" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="shortcut icon" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>

    <header class="hero">
      <div class="hero-copy">
        <p class="hero-kicker">EveryBuddy</p>
        <h1 id="hero-title">终端里养只小东西。</h1>
        <p id="hero-subtitle" class="hero-subtitle">
          随机抽一只，AI 给它写性格，它就住在你的 tmux 旁边，安安静静看你写代码。
        </p>
        <div class="hero-actions">
          <div id="hero-steps" class="hero-steps" aria-label="安装步骤">
            <button class="step-chip" data-copy="npm install -g everybuddy" type="button">
              <span class="step-chip-text">npm install -g everybuddy</span>
              <span class="step-chip-copied">已复制!</span>
            </button>
            <button class="step-chip" data-copy="buddy" type="button">
              <span class="step-chip-text">buddy</span>
              <span class="step-chip-copied">已复制!</span>
            </button>
            <button class="step-chip" data-copy="buddy install tmux" type="button">
              <span class="step-chip-text">buddy install tmux</span>
              <span class="step-chip-copied">已复制!</span>
            </button>
          </div>
          <a class="gh-link" href="https://github.com/Dylan-Nihilo/EveryBuddy" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <span>GitHub</span>
          </a>
          <a class="gh-link" href="https://www.npmjs.com/package/everybuddy" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M0 0v16h16V0H0zm13 13H8V5h2.5v5.5H13V5h0V3H3v10h10v0z"/>
            </svg>
            <span>npm</span>
          </a>
          <div class="lang-switch" aria-label="语言切换">
            <button id="lang-zh" class="lang-button is-active" type="button">中文</button>
            <button id="lang-en" class="lang-button" type="button">EN</button>
          </div>
        </div>
      </div>

      <section class="hero-panel">
        <div class="hero-panel-head">
          <p id="hero-panel-kicker" class="section-kicker">看一眼</p>
          <div id="hero-mode-switcher" class="hero-mode-switcher" aria-label="首屏模式切换"></div>
        </div>
        <div id="hero-stage" class="hero-stage" aria-live="polite"></div>
      </section>
    </header>

    <main class="layout">
      <section class="shelf-panel">
        <div class="shelf-copy">
          <p id="shelf-kicker" class="section-kicker">稀有度一览</p>
          <h2 id="shelf-title">看看都有谁。</h2>
          <p id="shelf-description">
            每个段位挑一只，够你看出这池子什么味道。
          </p>
          <div class="catalog-meta">
            <span id="artifact-meta"><strong id="artifact-count">24</strong> 个物种</span>
            <span id="rarity-meta"><strong id="rarity-count">5</strong> 个段位</span>
            <span id="runtime-meta">运行在 tmux + zsh</span>
          </div>
        </div>

        <div id="rarity-shelf" class="rarity-shelf"></div>
      </section>
    </main>

    <script defer src="./app.js"></script>
  </body>
</html>
